spring.application.name=subastas


# CONFIGURACIÓN DEL SERVIDOR
server.port=8080

# CONEXIÓN A POSTGRESQL
# Cambiá "subastas_db" por el nombre de tu base de datos local
spring.datasource.url=jdbc:postgresql://localhost:5432/subastas_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURACIÓN DE JPA Y HIBERNATE

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Fundamental: Le decimos "validate" en lugar de "update" porque Flyway crea las tablas
spring.jpa.hibernate.ddl-auto=validate
# Para ver en la terminal las consultas que hace a la base de datos (muy útil para debuggear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CONFIGURACIÓN DE FLYWAY

spring.flyway.enabled=true
# Crea una tabla de historial de flyway si la base de datos ya tenía cosas previas
spring.flyway.baseline-on-migrate=true