# =============================================
# SERVER
# =============================================
server.port=8080

# =============================================
# BASE DE DATOS
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/subastas_db
spring.datasource.username=postgres
spring.datasource.password=francoromero1610
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================
# FLYWAY
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =============================================
# JWT
# =============================================
app.jwt.secret=c3ViYXN0YXMtc2VjcmV0LWtleS10cGktcHJvZ3JhbWFjaW9uLWl2LTIwMjU=
app.jwt.expiration-ms=86400000

# =============================================
# SCHEDULER
# =============================================
spring.task.scheduling.pool.size=5

# =============================================
# LOGGING
# =============================================
logging.level.com.tpiProg.subastas=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO